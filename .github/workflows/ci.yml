name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        # The suite spends zero quota: no AI CLI is installed on this runner,
        # and conftest fails any test that tries to spawn a real process. The
        # flag-contract tests skip themselves here for want of a CLI; the
        # `contract` job below is where they actually run.
        run: pytest -q

  contract:
    # Do the flags we pass still exist on the CLIs we pass them to?
    #
    # This is the only job that installs a real AI CLI, and it exists because
    # nothing else can catch what it catches. The Codex adapter once shipped
    # passing `--ask-for-approval`, which `codex exec` rejects outright — every
    # run died at argument parsing, and all 38 of its mocked tests stayed green,
    # because a mocked Popen accepts anything you hand it. Only the CLI knows.
    #
    # It spends no quota and needs no auth: `--help` and `--version` parse
    # arguments and exit without reaching a model. There is no API key here and
    # this job must never need one.
    #
    # It pins nothing on purpose. Every other install in this file is pinned or
    # locked; this one tracks whatever the CLIs just shipped, because upstream
    # drift is the failure it is here to find. The cost is honest: a breaking
    # release upstream turns this red on a PR that did not touch it. That is the
    # bug arriving early rather than in a user's cron log at 3am.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install the AI CLIs
        run: |
          npm install -g @openai/codex @anthropic-ai/claude-code
          codex --version
          claude --version

      - name: Test the flag contract
        # The tests skip when a CLI is absent, so contributors without both are
        # not blocked. That makes a skip here indistinguishable from a pass, and
        # this job would guard nothing while reporting green — so fail on any
        # skip. If the CLIs stopped installing, that is the thing to hear about.
        #
        # `shell: bash` is load-bearing, not decoration: it is the only way to
        # get `-o pipefail`, and the default `bash -e` takes the exit code of
        # `tee`. Without it a failing pytest reports success through the pipe,
        # and this job would go green on the very drift it is here to catch.
        shell: bash
        run: |
          pytest tests/test_flag_contract.py -q -rs | tee /tmp/contract.txt
          ! grep -q 'skipped' /tmp/contract.txt || {
            echo "::error::the contract tests skipped, so nothing was verified"
            exit 1
          }

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: The packaged wheel must carry the prompt templates
        run: |
          python -m zipfile -l dist/*.whl | grep -q 'nightaudit/prompts/code_review.md'
      - name: The wheel must not carry the landing page
        # site/ is a sibling of the package, not part of it. If it ever lands in
        # the wheel, pyproject's packages list has drifted.
        run: |
          ! python -m zipfile -l dist/*.whl | grep -q 'site/'

      - name: The sdist must carry what it takes to build and test
        # An allowlist can't silently lose a directory the way a denylist lets
        # one in, but it can silently drop one. Anyone running `pip install
        # --no-binary` builds from these files.
        #
        # Every other sdist guard lives in release.yml and so only runs on a
        # tag. This one runs on the PR that would break the allowlist, which is
        # where the mistake is still cheap.
        run: |
          tar -tzf dist/*.tar.gz | grep -q 'nightaudit/prompts/code_review.md'
          tar -tzf dist/*.tar.gz | grep -q 'tests/'

      - name: The version must not drift
        # pyproject's version is what PyPI publishes; __init__'s is what
        # `nightaudit --version` prints. They are two hand-kept literals, so a
        # bump can touch one and miss the other — and the release workflow
        # compares the tag against pyproject alone. Drift would publish a
        # package whose own --version contradicts the tag it shipped under,
        # to a place PyPI does not allow taking it back from.
        run: |
          pyproject="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          package="$(python -c 'import nightaudit; print(nightaudit.__version__)')"
          test "$pyproject" = "$package" || {
            echo "pyproject says $pyproject, the package reports $package"
            exit 1
          }

      - name: The classifiers must match the Pythons we test
        # The classifiers are what PyPI advertises; the matrix above is what
        # actually passes. Two hand-kept lists, and only one of them ever runs,
        # so a new Python can be tested for months while PyPI still calls it
        # unsupported — which is exactly how 3.13 missed the 0.1.1 release.
        run: |
          pip install -q pyyaml
          python - <<'PY'
          import pathlib, sys, tomllib, yaml

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          advertised = {
              c.rsplit("::", 1)[1].strip()
              for c in project["classifiers"]
              if c.startswith("Programming Language :: Python :: ")
          }
          tested = set(
              yaml.safe_load(pathlib.Path(".github/workflows/ci.yml").read_text())
              ["jobs"]["test"]["strategy"]["matrix"]["python-version"]
          )
          if advertised != tested:
              sys.exit(
                  f"PyPI would advertise {sorted(advertised)} "
                  f"but CI tests {sorted(tested)}"
              )
          print(f"classifiers match the matrix: {sorted(tested)}")
          PY

      - name: The hero terminal must match its capture
        # site/lib/run-script.generated.ts is rendered from docs/shots/hero.txt.
        # Hand-editing it is how the landing page twice advertised output no
        # command has ever printed — the invented `[09:14] → project · task`,
        # once in the hero and once in the og:image. The captures are the only
        # writable source; this makes that true rather than merely asked for.
        run: |
          python3 docs/make-run-script.py
          git diff --exit-code site/lib/run-script.generated.ts

      - name: The README demo must match its generator
        # docs/demo.svg is generated and committed. Editing make-demo.py without
        # re-running it would leave the README showing stale CLI output.
        run: |
          python3 docs/make-demo.py
          git diff --exit-code docs/demo.svg

      - name: The README screenshots must match their generator
        # Same rule for docs/img/*.svg, rendered from the captures in
        # docs/shots/. Touching either without re-rendering leaves the README
        # showing a terminal the CLI no longer produces.
        #
        # Safe to pin to one Python: make-shots.py lays out by character cell
        # via unicodedata, and every character the captures use has held the
        # same width from Unicode 13 through 16 — the SVGs render byte-identical
        # on 3.10, 3.12, and 3.14.
        run: |
          python3 docs/make-shots.py
          git diff --exit-code docs/img
          test -z "$(git status --porcelain docs/img)"

  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - run: npm run lint
      - run: npx tsc --noEmit

      - name: The og:image needs its fonts committed
        # Satori never sees next/font, so opengraph-image.tsx reads these off
        # disk. Missing, they fail the build anyway — but as an ENOENT thrown
        # inside a prerender worker. This says why in one line instead.
        run: |
          test -f assets/fonts/space-grotesk-600.ttf
          test -f assets/fonts/jetbrains-mono-400.ttf
          test -f assets/fonts/jetbrains-mono-700.ttf

      - name: Build
        run: npm run build

      - name: The og:image must render as a real 1280x640 PNG
        run: |
          npx next start -p 3111 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3111/opengraph-image -o /tmp/og.png && break
            sleep 1
          done
          file /tmp/og.png
          file /tmp/og.png | grep -q 'PNG image data, 1280 x 640'
          test "$(wc -c < /tmp/og.png)" -gt 10000
